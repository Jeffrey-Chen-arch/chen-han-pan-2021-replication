# Pre-registered admissible specification grid for Stage-5 replication tournament.
# Every spec has academic justification (paper / SAS / Professor / Internet Appendix / TASS field
# ambiguity / standard convention). Selection is by transparent scoring, NOT by which gives the
# best Table III/IV result. All results retained.

# ----- SAMPLE specs -----
sample_specs:
  S0_paper_strict_current:
    label: "Paper-strict baseline (Sec I)"
    admissibility: "main"
    include_categories: "paper_7"
    currency_rule: "usd_code_only"
    net_return_rule: "strict_net"
    redemption_keep_missing: false
    aum_rule: "hybrid"
    min_aum_threshold: 5.0
    backfill_drop_obs: 12
    duplicate_rule: "exact_and_highconf"
    min_total_obs: 30

  S1_redemption_keep_missing:
    base: "S0_paper_strict_current"
    redemption_keep_missing: true
    admissibility: "sensitivity_admissible"
    justification: "TASS 'None'/'Not Defined' may be missing-redemption (not non-monthly); paper says monthly-or-better"

  S2_aum_fund_level_ever_ge5:
    base: "S0_paper_strict_current"
    aum_rule: "lenient"
    admissibility: "sensitivity_admissible"
    justification: "Paper '>=5m' may be fund-level not obs-level"

  S3_redemption_keep_missing_plus_aum_lenient:
    base: "S0_paper_strict_current"
    redemption_keep_missing: true
    aum_rule: "lenient"
    admissibility: "sensitivity_admissible"
    justification: "Both missing-data interpretations lenient"

  S4_currency_usd_code_or_description:
    base: "S0_paper_strict_current"
    currency_rule: "usd_code_or_description"
    admissibility: "sensitivity_admissible"
    justification: "TASS currencycode vs currencydescription ambiguity; both may indicate USD"

  S5_currency_usd_or_missing_flagged:
    base: "S0_paper_strict_current"
    currency_rule: "usd_or_missing"
    admissibility: "diagnostic"
    justification: "Missing currencycode may default to USD; diagnostic upper bound"

  S6_net_return_keep_missing:
    base: "S0_paper_strict_current"
    net_return_rule: "net_or_missing"
    admissibility: "sensitivity_admissible"
    justification: "TASS grossnett missing may not imply gross; paper says net-of-fee"

  S7_exact_duplicates_only:
    base: "S0_paper_strict_current"
    duplicate_rule: "exact_only"
    admissibility: "sensitivity_admissible"
    justification: "Drop high-confidence identical-history rule may over-remove"

  S8_no_duplicate_removal:
    base: "S0_paper_strict_current"
    duplicate_rule: "none"
    admissibility: "diagnostic"
    justification: "Diagnostic upper bound (no dedup)"

  S9_all_11_categories:
    base: "S0_paper_strict_current"
    include_categories: "all_11"
    admissibility: "internet_appendix"
    justification: "Internet Appendix IA.I robustness"
    paper_target:
      table: "IA.I"
      excess_spread: 0.39
      excess_t: 3.04
      alpha_spread: 0.52
      alpha_t: 2.61

  S10_alternative_filters_24m_10m:
    base: "S0_paper_strict_current"
    backfill_drop_obs: 24
    aum_rule: "hybrid"
    min_aum_threshold: 10.0
    admissibility: "internet_appendix"
    justification: "Internet Appendix IA.II robustness"
    paper_target:
      table: "IA.II"
      excess_spread: 0.34
      excess_t: 3.17
      alpha_spread: 0.55
      alpha_t: 3.04

  S13_old_tass_schema:
    base: "S0_paper_strict_current"
    tass_source: "tr_tass_old"
    admissibility: "sensitivity_admissible"
    justification: "TASS vintage ambiguity; closer to author 2018 snapshot"

  S14_fund_identifier_name_company_cluster:
    base: "S0_paper_strict_current"
    fund_identifier_rule: "name_company_cluster"
    admissibility: "diagnostic_high_value"
    justification: "productreference may = share class, not paper 'fund'; cluster by Management Firm companyid + primarycategory + currencycode"
    audit_finding: >
      CAUTION (corrected audit 26): this companyid x category x currency key OVER-AGGREGATES distinct
      funds run by the same firm; it moves the count DOWN (2,270 -> ~1,396), not toward 4,073. It is a
      diagnostic lower bound, NOT a valid 'fund' unit. See stage5A_identifier_audit_corrected.xlsx.

  S23_finer_shareclass_or_vehicle_identifier:
    base: "S0_paper_strict_current"
    fund_identifier_rule: "productreference_plus_shareclass_or_vehicle_if_available"
    admissibility: "diagnostic_high_value"
    justification: "Test whether a unit FINER than productreference exists (paper count > ours)."
    audit_finding: >
      NOT CONSTRUCTIBLE: the WRDS-anonymized TASS has NO isin/cusip/sedol/shareclassreference/vehicle/
      fundreference field in any of 48 tables, and `name` is anonymized 1:1 with productreference.
      productreference is therefore already the FINEST available unit; this spec cannot be run.

  # ----- Interaction specs S15-S22: combine relaxations (per expert review) -----
  S15_all11_keep_missing_redemption:
    base: "S0_paper_strict_current"
    include_categories: "all_11"
    redemption_keep_missing: true
    admissibility: "diagnostic"
    justification: "Interaction: all-11 categories x keep-missing-redemption (IA + sensitivity combined)"

  S16_all11_aum_lenient:
    base: "S0_paper_strict_current"
    include_categories: "all_11"
    aum_rule: "lenient"
    admissibility: "diagnostic"
    justification: "Interaction: all-11 categories x fund-level AUM (IA + sensitivity combined)"

  S17_all11_keep_missing_aum_lenient:
    base: "S0_paper_strict_current"
    include_categories: "all_11"
    redemption_keep_missing: true
    aum_rule: "lenient"
    admissibility: "diagnostic"
    justification: "Interaction: all-11 x keep-missing-redemption x lenient AUM"

  S18_all11_keep_missing_aum_lenient_currency_loose:
    base: "S0_paper_strict_current"
    include_categories: "all_11"
    redemption_keep_missing: true
    aum_rule: "lenient"
    currency_rule: "usd_code_or_description"
    admissibility: "diagnostic"
    justification: "Maximally lenient admissible interaction (all relaxations on)"

  S19_cluster_keep_missing_redemption:
    base: "S14_fund_identifier_name_company_cluster"
    redemption_keep_missing: true
    admissibility: "diagnostic_high_value"
    justification: "Cluster identifier x keep-missing-redemption (does clustering interact with the redemption filter?)"

  S20_cluster_aum_lenient:
    base: "S14_fund_identifier_name_company_cluster"
    aum_rule: "lenient"
    admissibility: "diagnostic_high_value"
    justification: "Cluster identifier x lenient AUM"

  S21_cluster_all11:
    base: "S14_fund_identifier_name_company_cluster"
    include_categories: "all_11"
    admissibility: "diagnostic_high_value"
    justification: "Cluster identifier x all-11 categories"

  S22_cluster_max_lenient:
    base: "S14_fund_identifier_name_company_cluster"
    redemption_keep_missing: true
    aum_rule: "lenient"
    include_categories: "all_11"
    currency_rule: "usd_code_or_description"
    admissibility: "diagnostic_high_value"
    justification: "Cluster identifier x maximally lenient admissible interaction"

